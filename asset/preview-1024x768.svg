    <text x="84" y="49" fill="#FFF7ED" font-size="25" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">安全与高危确认</text>
    <text x="24" y="96" fill="#FFE9D1" font-size="16" font-weight="500" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">把危险操作挡在真正执行前</text>
    <text x="24" y="128" fill="#F4C89B" font-size="15" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">• 删除 / 移动 / 上传本地文件先确认</text>
    <text x="24" y="154" fill="#F4C89B" font-size="15" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">• 大文件上传需二次确认后重试</text>
    <text x="24" y="188" fill="#FFD08A" font-size="14" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">安全约束写进工具说明，AI 更不容易越界</text>
  </g>

