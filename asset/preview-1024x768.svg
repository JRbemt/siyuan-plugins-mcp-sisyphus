    <text x="24" y="96" fill="#D8E3FF" font-size="16" font-weight="500" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">只在需要时展开复杂度，也保留轻反馈</text>
    <text x="24" y="128" fill="#9DB2D7" font-size="15" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">• common actions → help → drill-down</text>
    <text x="24" y="154" fill="#9DB2D7" font-size="15" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">• mascot 可查看余额、商店与购买动作</text>
    <text x="24" y="188" fill="#7DD3FC" font-size="14" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">信息负担更低，调试与回馈也更直观</text>
  </g>

