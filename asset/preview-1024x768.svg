  <text x="64" y="92" fill="#F8FAFC" font-size="38" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">SiYuan MCP Sisyphus</text>
  <text x="64" y="126" fill="#CBD5E1" font-size="18" font-weight="500" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">8 个聚合工具 + 细粒度权限 + 渐进式披露，让 AI 更稳地接入你的思源知识库</text>

  <g transform="translate(64 166)">
    <rect width="332" height="214" rx="24" fill="url(#panelFill)" stroke="url(#cardStroke)" stroke-width="1.4" filter="url(#cardShadow)"/>
    <rect x="24" y="24" width="44" height="44" rx="12" fill="#11284F" stroke="#7CB3FF" stroke-opacity="0.45"/>
    <rect x="33" y="33" width="10" height="10" rx="2" fill="#87B7FF"/>
    <rect x="49" y="33" width="10" height="10" rx="2" fill="#87B7FF" opacity="0.9"/>
    <rect x="33" y="49" width="10" height="10" rx="2" fill="#87B7FF" opacity="0.9"/>
    <rect x="49" y="49" width="10" height="10" rx="2" fill="#87B7FF" opacity="0.7"/>
    <text x="84" y="49" fill="#F8FAFC" font-size="25" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">8 个聚合工具</text>
    <text x="24" y="96" fill="#D8E3FF" font-size="16" font-weight="500" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">把常用能力收敛为稳定的 tool 面</text>
    <text x="24" y="128" fill="#9DB2D7" font-size="15" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">• notebook / document / block / file</text>
    <text x="24" y="154" fill="#9DB2D7" font-size="15" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">• search / tag / system / mascot</text>
    <text x="24" y="188" fill="#7DD3FC" font-size="14" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">减少模型误选工具，接口语义更统一</text>
  </g>

  <g transform="translate(64 402)">
    <rect width="332" height="214" rx="24" fill="url(#panelFill)" stroke="url(#cardStroke)" stroke-width="1.4" filter="url(#cardShadow)"/>
    <rect x="24" y="24" width="44" height="44" rx="12" fill="#17294D" stroke="#85A7FF" stroke-opacity="0.45"/>
    <path d="M39 39H53C59.0751 39 64 43.9249 64 50V54C64 60.0751 59.0751 65 53 65H39C32.9249 65 28 60.0751 28 54V50C28 43.9249 32.9249 39 39 39Z" stroke="#A5B4FC" stroke-width="2"/>
