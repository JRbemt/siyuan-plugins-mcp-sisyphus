    <path d="M46 33L58 38V46C58 55.3888 52.9974 62.8665 46 66C39.0026 62.8665 34 55.3888 34 46V38L46 33Z" stroke="#FFCB84" stroke-width="2.4" stroke-linejoin="round"/>
