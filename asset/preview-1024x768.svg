<svg width="1024" height="768" viewBox="0 0 1024 768" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="120" y1="80" x2="930" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#111B3A"/>
      <stop offset="1" stop-color="#050816"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(780 140) rotate(123) scale(340 290)">
      <stop stop-color="#4F8CFF" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#4F8CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 620) rotate(14) scale(380 250)">
      <stop stop-color="#8B5CF6" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardStroke" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#6AA9FF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0.14"/>
    </linearGradient>
    <linearGradient id="panelFill" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#162447" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#0D152E" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="accentBlue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#74B2FF"/>
      <stop offset="1" stop-color="#5978FF"/>
    </linearGradient>
    <linearGradient id="accentOrange" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFB866"/>
      <stop offset="1" stop-color="#FF7A59"/>
    </linearGradient>
    <linearGradient id="accentGold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFE483"/>
      <stop offset="1" stop-color="#FFB648"/>
    </linearGradient>
    <pattern id="gridPattern" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#7DD3FC" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="cardShadow" x="-30" y="-30" width="180" height="180" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <filter id="softShadow" x="-60" y="-60" width="240" height="240" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1024" height="768" rx="28" fill="url(#bgGradient)"/>
  <rect width="1024" height="768" rx="28" fill="url(#gridPattern)"/>
  <rect width="1024" height="768" rx="28" fill="url(#glowBlue)"/>
  <rect width="1024" height="768" rx="28" fill="url(#glowPurple)"/>

  <g opacity="0.16">
    <circle cx="114" cy="112" r="3" fill="#C7D2FE"/>
    <circle cx="156" cy="112" r="3" fill="#C7D2FE"/>
    <circle cx="198" cy="112" r="3" fill="#C7D2FE"/>
