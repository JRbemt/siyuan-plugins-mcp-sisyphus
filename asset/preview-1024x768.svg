    <text x="84" y="49" fill="#F8FAFC" font-size="25" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">权限模型</text>
    <text x="24" y="96" fill="#D8E3FF" font-size="16" font-weight="500" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">按笔记本控制 AI 可见与可写边界</text>
    <text x="24" y="128" fill="#9DB2D7" font-size="15" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">• `none / r / rw / rwd` 四态权限</text>
    <text x="24" y="154" fill="#9DB2D7" font-size="15" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">• 调用前先做权限守卫与过滤</text>
    <text x="24" y="188" fill="#7DD3FC" font-size="14" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">让自动化链路更细腻，也更可控</text>
  </g>

  <g transform="translate(628 166)">
    <rect width="332" height="214" rx="24" fill="url(#panelFill)" stroke="url(#accentOrange)" stroke-opacity="0.4" stroke-width="1.4" filter="url(#cardShadow)"/>
